# Ensure the line break is active
[line_break]
disabled = false

[status]
disabled = false
symbol = "Ô£İ "
format = "[ $symbol $common_meaning (\\($int\\)) ]($style)"
style = "red bold"
# This translates error codes to appropriate symbol like
# 127 (NOTFOUND) to ­şöı
# 130 (TERMINATED) to ­şğ▒
map_symbol = true 

# Configure the prompt character for the second line
[character]
disabled = false
success_symbol = "[´É▓ ](bold green)"
